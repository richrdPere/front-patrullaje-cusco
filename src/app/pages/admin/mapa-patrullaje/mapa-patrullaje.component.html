<div class="relative w-full h-screen bg-base-300 text-base-content">

  <!-- ========================= -->
  <!-- MAPA (BASE) -->
  <!-- ========================= -->
  <div #map class="absolute inset-0 w-full h-full z-0"></div>

  <!-- ========================= -->
  <!-- LOADING -->
  <!-- ========================= -->
  @if (!mapaCargado) {
  <div class="absolute inset-0 flex flex-col items-center justify-center bg-base-100/70 z-20">
    <span class="loading loading-spinner text-primary w-10 h-10 mb-2"></span>
    <span class="font-semibold">Cargando mapa...</span>
  </div>
  }

  <!-- ========================= -->
  <!-- BOTÓN ZONAS (OVERLAY) -->
  <!-- ========================= -->
  @if (!panelVisible) {
  <button
    (click)="mostrarPanel()"
    class="btn btn-primary btn-sm absolute top-4 right-8 z-30 flex items-center gap-1 shadow-lg">
    <i class="fa-solid fa-map-location-dot"></i>
    <span>Zonas</span>
  </button>
  }

  <!-- ========================= -->
  <!-- PANEL ZONAS (FLOAT) -->
  <!-- ========================= -->
  @if (panelVisible) {
  <div class="absolute top-4 right-4 w-64 sm:w-72 z-40" #zonaPanel>

    <div class="bg-base-100/90 backdrop-blur-md rounded-xl shadow-xl p-4 border border-base-200">

      <!-- HEADER -->
      <div class="flex justify-between items-center mb-3">
        <h2 class="text-sm sm:text-base font-semibold">
          Zonas de Patrullaje
        </h2>

        <button
          (click)="ocultarPanel()"
          class="btn btn-xs btn-ghost btn-circle">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <!-- LISTA -->
      <ul class="space-y-2 max-h-[50vh] overflow-y-auto">

        @for (zona of zonas; track $index) {
        <li>
          <label class="flex items-center gap-2 cursor-pointer">

            <input
              type="checkbox"
              class="checkbox checkbox-xs sm:checkbox-sm"
              [checked]="zonasVisibles[zona.id]"
              (change)="toggleZona(zona)"
            />

            <span class="text-xs sm:text-sm">
              {{ zona.nombre }}
            </span>

          </label>
        </li>
        }

      </ul>

    </div>
  </div>
  }

</div>
